version: '3.8'

# ─────────────────────────────────────────────────────────────────────────
# LOCAL DEV ONLY — full stack (Redis + MongoDB).
# Same caveats as docker-compose.yml: this Redis is ephemeral and is
# NEVER used in production. See docs/REDIS_OPS.md.
# ─────────────────────────────────────────────────────────────────────────

services:
  # Main Application
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_KEY_PREFIX: "svc1:local:"
      MONGO_URI: mongodb://mongo:27017/e-pharmacy
    env_file:
      - ./config/.env
    volumes:
      - ./temp_uploads:/usr/src/app/temp_uploads
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_started
    restart: unless-stopped

  # Local Redis — pinned, capped, ephemeral.
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

  # Local MongoDB
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: e-pharmacy
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
